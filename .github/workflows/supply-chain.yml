# Pipeline supply-chain de référence (Lab 5).
# build → SBOM → scan → push → sign (keyless) → attest (SBOM + provenance).
# Signature KEYLESS : aucune clé stockée, l'identité est celle de CE workflow (OIDC).
name: supply-chain

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # pousser sur GHCR
  id-token: write        # OIDC → signature keyless (Fulcio/Rekor)

env:
  # Package distinct de celui poussé à la main aux labs 0-2 : un package GHCR créé par un push
  # manuel reste orphelin (rattaché à aucun dépôt), et le GITHUB_TOKEN du workflow n'a alors
  # aucun droit dessus. Créé par la CI, il est rattaché au dépôt automatiquement.
  # Les policies Kyverno matchent déjà "ghcr.io/<owner>/scs-demo-app*".
  IMAGE: ghcr.io/${{ github.repository_owner }}/scs-demo-app-ci

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (récupère le digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Référence par digest
        id: ref
        run: echo "ref=${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # ---- SBOM ----
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate SBOM (SPDX + CycloneDX)
        run: |
          syft "${{ steps.ref.outputs.ref }}" -o spdx-json > sbom.spdx.json
          syft "${{ steps.ref.outputs.ref }}" -o cyclonedx-json > sbom.cdx.json

      # ---- Scan : casse si CRITICAL corrigeable ----
      - name: Scan (Grype) — gate sur CRITICAL
        uses: anchore/scan-action@v4
        with:
          image: ${{ steps.ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          only-fixed: true

      # ---- Signature keyless ----
      # cosign v3 stocke signature et attestations via l'API OCI referrers et ne crée plus les
      # tags .sig/.att que Kyverno recherche : on reste sur la v2 tant que Kyverno n'a pas suivi.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.5.3'
      - name: Sign image (keyless)
        run: cosign sign --yes "${{ steps.ref.outputs.ref }}"

      # ---- Attestation SBOM ----
      # CycloneDX et non SPDX : l'attestation SPDX (~2,3 Mo) dépasse la limite de contexte de
      # Kyverno (2 Mio, codée en dur), qui refuse alors l'image légitime.
      - name: Attest SBOM (CycloneDX)
        run: |
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${{ steps.ref.outputs.ref }}"

      # ---- Attestation de provenance SLSA ----
      - name: Génère la provenance
        run: |
          cat > provenance.json <<EOF
          {
            "buildType": "https://github.com/actions/runner/v1",
            "builder": { "id": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/supply-chain.yml@${{ github.ref }}" },
            "invocation": {
              "configSource": {
                "uri": "git+${{ github.server_url }}/${{ github.repository }}",
                "digest": { "sha1": "${{ github.sha }}" }
              }
            }
          }
          EOF
      - name: Attest provenance (SLSA)
        run: |
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${{ steps.ref.outputs.ref }}"

      - name: Récapitulatif
        run: |
          echo "### Image signée & attestée :computer:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.ref.outputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"

# NB : pour une provenance SLSA "officielle" (niveau supérieur), voir le générateur
#      slsa-framework/slsa-github-generator (job séparé). Le bloc ci-dessus est volontairement
#      simple à des fins pédagogiques.
