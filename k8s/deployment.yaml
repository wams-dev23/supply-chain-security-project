# Déploiement de l'app — À DÉPLOYER PAR DIGEST (pas par tag).
# ➜ Remplacez l'image ci-dessous par VOTRE digest signé (sortie de `echo $DIGEST` au Lab 0/2).
#    ex : ghcr.io/<votre-user>/scs-demo-app@sha256:abcd1234...
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scs-demo-app
  namespace: app
  labels: { app: scs-demo-app }
spec:
  replicas: 2
  selector:
    matchLabels: { app: scs-demo-app }
  template:
    metadata:
      labels: { app: scs-demo-app }
    spec:
      containers:
        - name: app
          image: ghcr.io/wams-dev23/scs-demo-app@sha256:4e4ef40c84943171fe11ebddd39e3fe9710b9a206f60f775d91e3e1c8aef9076
          ports:
            - containerPort: 8080
          volumeMounts:
            # gunicorn a besoin d'écrire ses fichiers de worker : /tmp inscriptible
            # sans renoncer à readOnlyRootFilesystem
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
          securityContext:
            runAsNonRoot: true
            # uid numérique obligatoire : kubelet ne peut pas vérifier le USER appuser du Dockerfile
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scs-demo-app
  namespace: app
spec:
  type: NodePort
  selector: { app: scs-demo-app }
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080     # mappé sur localhost:8080 par kind-config.yaml
